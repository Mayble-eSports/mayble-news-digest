name: Mayble News Digest (MBL)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"  # 08:00 São Paulo (UTC-3)
    - cron: "0 21 * * *"  # 18:00 São Paulo (UTC-3)

concurrency:
  group: mayble-news-digest
  cancel-in-progress: true

permissions:
  contents: write  # necessário porque o job commita os caches

defaults:
  run:
    shell: bash

env:
  # Limites
  MAX_POSTS_PER_RUN: "4"
  MAX_VLR_PER_RUN: "2"
  MAX_THESPIKE_PER_RUN: "2"

  # Logs
  LOG_LEVEL: "INFO"

  # Tradução
  TRANSLATE_PT: "1"
  TRANSLATE_ONLY_VLR: "1"

  # Canal (corrige o texto do header no Discord)
  CHANNEL_LABEL: "#noticias-do-competitivo"

  # Cache (mantém arquivo pequeno/estável)
  CACHE_KEEP_DAYS: "30"
  CACHE_MAX_ITEMS: "2000"
  TRANSLATE_CACHE_MAX_ITEMS: "2000"

  # Branding (MBL)
  EMBED_COLOR: "16742912"
  BRAND_NAME: "Mayble eSports (MBL)"
  BRAND_URL: "https://mayble.com.br"
  FOOTER_TEXT: "Mayble eSports • @mayblegg"

  # Ícone/Thumbnail = LOGO
  BRAND_ICON_URL: "https://cdn.discordapp.com/attachments/1458537563621949576/1478832921644236931/logo_4k-Photoroom.png?ex=69a9d5fb&is=69a8847b&hm=51a737254c927d254415e3f2c998f96777aec4e8899d80e8eadf6beb787db0b4&"
  BRAND_THUMBNAIL_URL: "https://cdn.discordapp.com/attachments/1458537563621949576/1478885874765922595/LOGo-Photoroom.png?ex=69aa074c&is=69a8b5cc&hm=432c9a95bc70fbd8a38a5757b2651e5bf1dc53387b17a47415c12d8c9648c2e4&"

  # Fallback p/ compatibilidade com script antigo (se ainda ler "VORAX_LOGO_URL")
  VORAX_LOGO_URL: "https://cdn.discordapp.com/attachments/1440760869964484738/1478779402614608024/logo_4k-Photoroom.png?ex=69a9a423&is=69a852a3&hm=7bede44e52378dfb966d0f663a799c8fac1936b000df84bd3a4fe05ad34f4369&"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Sanity check (secret)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "Missing secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python bot_noticias_digest_ptbr.py

      - name: Commit state (anti-duplicado)
        run: |
          set -euo pipefail
          git config user.name "mbl-news-bot"
          git config user.email "bot@mayble.local"

          git add posted_cache.json translate_cache.json || true
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
            exit 0
          fi

          git commit -m "chore: update news cache"

          # rebase depois do commit (evita erro de working tree suja)
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
